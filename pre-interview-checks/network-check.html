              <p class="text">Web面接では、通信の安定性が非常に重要です。映像や音声が途切れると、それだけで印象に影響する場合があります。</p>
            </article>
            <article class="card">

              </ul>
            </article>
            <article class="note">
              <p class="text">本校として、Wi-Fiはできる限り安定に努めていますが、面談室以外を使用する場合は留意してください。</p>
              <p class="text">有線接続や別回線、再入室手段を用意しておくと、面接時の不安を減らせます。</p>
