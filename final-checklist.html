        <div class="slide-header-bar">
          <span class="eyebrow">Section 5</span>
          <div class="pager-main">
            <div class="pager-links">

          <div class="stack">

              <h1 id="section5-title" class="section-title">5. 最終チェックリスト</h1>
              <p class="text">面接前の確認事項をまとめて見直し、当日に慌てない状態に整えるための最終ページです。接続、資料、見え方、話す内容を短時間で確認できる形にします。</p>
            </article>
            <section class="checklist-grid" aria-label="最終チェック項目">
              <article class="checklist-card">
                <h2 class="block-title">環境</h2>
                <ul class="list">
                  <li>マイクとカメラは使用可能か</li>
                  <li>照明と背景に問題はないか</li>
                  <li>通信が安定しているか</li>
                </ul>
              </article>
              <article class="checklist-card">
                <h2 class="block-title">資料</h2>
                <ul class="list">
                  <li>求人情報と企業情報を確認済みか</li>
                  <li>履歴書と職務経歴書を見返したか</li>
                  <li>ポートフォリオの説明準備ができているか</li>
                </ul>
              </article>
            </section>
          </div>
          <aside class="image-panel" aria-label="最終確認のイメージ">
            <div class="image-frame">
              <img src="image/ウェブ面接準備のチェックリスト20.png" alt="最終確認のイメージ">
            </div>
